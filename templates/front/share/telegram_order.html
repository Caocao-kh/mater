<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Status</title>

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <style>
        .modal.fade {
            display: none;
        }

        .modal.show {
            display: block;
        }

        /* Keeping your custom teal color if needed */
        .btn-teal {
            background-color: #0d9488;
            color: white;
        }

        .btn-teal:hover {
            background-color: #0f766e;
            color: white;
        }
    </style>
</head>

<body class="bg-slate-50 link-secondary">
    <div class="modal fade" id="thankYouModal" tabindex="-1" aria-labelledby="thankYouModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content text-center p-4 rounded-2xl border-0 shadow-xl bg-white">
                <div class="modal-body">
                    <div class="text-success mb-3 flex justify-center animate-bounce">
                        <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" fill="currentColor"
                            class="bi bi-check-circle-fill d-inline-block text-teal-600" viewBox="0 0 16 16">
                            <path
                                d="M16 8A8 8 0 1 1 0 8a8 8 0 0 1 16 0m-3.97-3.03a.75.75 0 0 0-1.08.022L7.477 9.417 5.384 7.323a.75.75 0 0 0-1.06 1.06L6.97 11.03a.75.75 0 0 0 1.079-.02l3.992-4.99a.75.75 0 0 0-.01-1.05z" />
                        </svg>
                    </div>
                    <h2 class="fw-bold text-dark text-3xl tracking-tight">Thank You!</h2>
                    <p class="text-secondary my-3 text-base leading-relaxed">Your order has been successfully placed and
                        sent via Telegram. We will process it shortly!</p>

                    <a href="{{ url_for('products') }}"
                        class="btn btn-teal btn-lg w-100 mt-2 py-2.5 fw-bold transition-all duration-200 transform hover:scale-[1.01]">
                        Continue Shopping
                    </a>
                </div>
            </div>
        </div>
    </div>

    {% with messages = get_flashed_messages() %}
    {% if 'order_success' in messages %}
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            var myModal = new bootstrap.Modal(document.getElementById('thankYouModal'));
            myModal.show();
        });
    </script>
    {% endif %}
    {% endwith %}

</body>

</html>
