<link rel="stylesheet"
      href="{{ url_for('static', filename='front/navber.css') }}">
<header class="sticky-top shadow-sm">
<link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <nav class="navbar navbar-expand-lg custom-navbar py-3">
        <div class="container">

            <a class="navbar-brand font-weight-bold" href="{{ url_for('home') }}">
                COMPUTER <span>STORE</span>
            </a>

            <button class="navbar-toggler border-0 text-white"
                    type="button"
                    data-bs-toggle="collapse"
                    data-bs-target="#mainNavbar">
                <i class="bi bi-list fs-2"></i>
            </button>

            <div class="collapse navbar-collapse" id="mainNavbar">

                <ul class="navbar-nav mx-auto align-items-lg-center">
                    <li class="nav-item">
                        <a class="nav-link {% if current_page == 'home' %}active{% endif %}"
                           href="{{ url_for('home') }}">
                            Home
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if current_page == 'products' %}active{% endif %}"
                           href="{{ url_for('products') }}">
                            Products
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('account') }}">
                            Account
                        </a>
                    </li><li class="nav-item">
                        <a class="nav-link" href="{{ url_for('contact') }}">
                            Contact
                        </a>
                    </li>
                </ul>

                <div class="d-flex align-items-center gap-3 mt-3 mt-lg-0">
                    <a href="{{ url_for('cart') }}"
                       class="nav-icon text-decoration-none position-relative me-2"
                       title="View Cart">

                        <i class="bi bi-cart3 fs-5"></i>

                        {% if cart_count and cart_count > 0 %}
                        <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-success">
                             {{ cart_count }}
                        </span>
                        {% endif %}
                    </a>

                    <div class="d-flex gap-2">
                        {# Checks if user is NOT logged in #}
                        {% if not session.get('user') %}
                            <a href="{{ url_for('login') }}"
                               class="btn btn-outline-light btn-auth px-3 py-2">
                                Login
                            </a>
                            <a href="{{ url_for('create_user') }}" class="btn btn-success btn-auth px-3 py-2">
                                Register
                            </a>
                        {% else %}
                            {# Displays if the user IS logged in #}
                            <a href="{{ url_for('account') }}"
                               class="btn btn-outline-light btn-auth px-3 py-2">
                                My Account
                            </a>
                        {% endif %}
                    </div>

                </div>

            </div>
        </div>
    </nav>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script>

document.querySelector('.nav-icon')
.addEventListener('click', function(e){

    Swal.fire({
        icon:'info',
        title:'Shopping Cart',
        text:'Opening your cart...',
        timer:1200,
        showConfirmButton:false
    });

});

</script>

</header>
<script>

window.addEventListener('scroll', function(){

    let navbar =
        document.querySelector('.custom-navbar');

    if(window.scrollY > 50){

        navbar.classList.add('scrolled');

    }else{

        navbar.classList.remove('scrolled');
    }

});

</script>
