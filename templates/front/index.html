<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Superman Electronics</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../../static/front/styles.css">
</head>
<body>

{% include 'front/share/navbar.html' %}

<main>

<section class="bg-soft py-5">
  <div class="container">
    <div class="d-flex justify-content-between align-items-end mb-4">
      <div>
        <p class="eyebrow mb-1">Best picks</p>
        <h2 class="fw-bold mb-0">Popular electronics</h2>
      </div>
      <a class="link-teal fw-bold text-decoration-none" href="/products">View all</a>
    </div>

    <div class="row g-4">
        {% for p in products %}
          <div class="col-sm-6 col-md-4 col-lg-3">
            <div class="card product-card border-0 shadow-sm h-100 transition-up">

              <div class="p-3 bg-white d-flex align-items-center justify-content-center" style="height: 200px;">
                <img src="{{ p.image }}" class="card-img-top img-fluid" alt="Arena Wireless Controller" style="max-height: 100%; width: auto; object-fit: contain;">
              </div>

              <div class="card-body d-flex flex-column p-3">
                <p class="product-meta text-muted small text-uppercase mb-1 text-truncate" style="max-width: 100%;">{{ p.title }}</p>

                <h3 class="h6 fw-bold text-dark mb-2 text-truncate-2" style="height: 40px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; font-size: 0.95rem; line-height: 1.4;">
                  {{ p.description }}
                </h3>

                <div class="mt-auto pt-2">
                  <p class="price fw-bold h5 text-teal mb-3">${{ p.price }}</p>
                  <a class="btn btn-teal w-100 py-2 fw-semibold small" href="/product/{{ p.id }}">View product</a>
                </div>
              </div>

            </div>
          </div>
        {% endfor %}
    </div>
  </div>
</section>
  </main>

{% include 'front/share/footer.html' %}

</body>
</html>
